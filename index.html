<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ivana 💖</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:black;
    font-family: 'Segoe UI', sans-serif;
    color:white;
}

/* INTRO */
#intro {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    z-index:10;
}

#intro h1 {
    font-size:40px;
    color:#ff66cc;
    text-shadow:0 0 20px #ff66cc;
}

#startBtn {
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:#ff4d88;
    color:white;
    cursor:pointer;
}

/* MAIN */
#main {
    display:none;
    text-align:center;
}

/* LIRIO */
.lily {
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%) scale(0);
    font-size:120px;
    filter:drop-shadow(0 0 20px white);
    animation:grow 4s forwards;
}

@keyframes grow {
    to {transform:translateX(-50%) scale(1);}
}

/* TEXTO */
#text {
    margin-top:40px;
    font-size:24px;
}

/* GALERIA */
.gallery {
    position:absolute;
    bottom:120px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
}

.gallery img {
    width:120px;
    height:160px;
    border-radius:15px;
    transition:0.5s;
}

.gallery img:hover {
    transform:scale(1.3);
}

/* BOTON */
#loveBtn {
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 40px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#ff4d88,#ff99cc);
    color:white;
    font-size:20px;
    cursor:pointer;
}

/* FINAL */
#final {
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.choice {
    margin:10px;
    padding:15px 30px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>Esto es para vos, Ivana 💖</h1>
    <button id="startBtn" onclick="start()">Entrar ✨</button>
</div>

<!-- MAIN -->
<div id="main">
    <h1>Ivana 💖</h1>
    <div id="text"></div>

    <div class="lily">🤍🌸</div>

   <div class="gallery">
    <img src="foto1.jpg" onclick="mensaje('Este día fue uno de los más felices con vos 💖')">
    <img src="foto2.jpg" onclick="mensaje('No dejo de pensar en tu sonrisa ✨')">
    <img src="foto3.jpg" onclick="mensaje('Sos mi lugar favorito en el mundo 🌎💘')">
</div>

    <button id="loveBtn" onclick="explosion()">Por Siempre 💘</button>
</div>

<!-- FINAL -->
<div id="final">
    <h1>¿Te quedas conmigo para siempre? 💍</h1>
    <button class="choice" onclick="yes()">SI 💖</button>
    <button class="choice" onclick="no()">NO 😢</button>
</div>

<canvas id="canvas"></canvas>

<audio id="music">
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce1c.mp3">
</audio>

<script>
// START
function start(){
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
    typeWriter();
}

// TEXTO
let msg="Te extraño... te amo... sos mi vida entera, Ivana 💖";
let i=0;
function typeWriter(){
    if(i<msg.length){
        document.getElementById("text").innerHTML+=msg.charAt(i);
        i++;
        setTimeout(typeWriter,50);
    }
}

// FUEGOS
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

function firework(x,y){
    for(let i=0;i<200;i++){
        particles.push({
            x,y,
            dx:(Math.random()-0.5)*10,
            dy:(Math.random()-0.5)*10,
            life:100
        });
    }
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;

        ctx.fillStyle="hsl("+Math.random()*360+",100%,70%)";
        ctx.fillRect(p.x,p.y,3,3);

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}
animate();

// BOTON
function explosion(){
    document.getElementById("music").play();

    for(let i=0;i<10;i++){
        setTimeout(()=>{
            firework(Math.random()*canvas.width, Math.random()*canvas.height/2);
        },i*200);
    }

    setTimeout(()=>{
        document.getElementById("main").style.display="none";
        document.getElementById("final").style.display="flex";
    },3000);
}

// FINAL
function yes(){
    document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;background:black;color:white;text-align:center;">
            <h1 style="font-size:50px;color:#ff66cc;">Ahora sos mía para siempre 💖</h1>
            <p style="font-size:25px;">Te amo más que a nada en este mundo, Ivana ✨</p>
        </div>
    `;
}

function no(){
    alert("No vale 😢 tu destino es amarme 💖");
}
</script>

</body>
</html>
